<!DOCTYPE>
<html>
  <title> My Portfolio </title>
<body>
  <h1> Quiz Upload Page </h1>
  <form>
    <label for="quiz-title">Quiz Title:</label><br>
    <input type="text" id="quiz-title" name="quiz-title" placeholder="Enter quiz title"><br><br>

    <label for="quiz-file">Select Quiz File:</label><br>
    <input type="file" id="quiz-file" name="quiz-file"><br><br>

    <label for="quiz-proof">Upload Proof Image:</label><br>
    <input type="file" id="quiz-proof" name="quiz-proof" accept="image/*"><br><br>

    <button type="button" onclick="alert('Quiz submitted (simulated)')">Submit Quiz</button>
  </form>
</body>
</html>
