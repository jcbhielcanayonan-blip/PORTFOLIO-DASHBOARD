<!DOCTYPE html>
<html>
  <head>
    <title> My Portfolio </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  </head>
  
<body>
  <h1> Quiz Upload </h1>

  <nav>
    <ul>
      <li> <a href = "index.html">Home</a> </li>
      <li> <a href = "quiz.html">Quiz Upload</a> </li>
      <li> <a href = "lab.html">Lab Work Upload</a> </li>
      <li> <a href = "exam.html">Exam Upload</a> </li>
    </ul>
  </nav>

  <hr>
  
  <style>

  .quiz-images {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
  }

  .quiz-images img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
  border: 3px solid #4B0082;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }
    
  body {
  background-image: url('dss.jpg');
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  }

  h1 {
    text-align: center;
  }

  nav {
  text-align: center;
  margin-bottom: 15px;
  }

  nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: inline-flex; 
  gap: 20px; 
  }

  nav li {
  position: relative;
  }

  nav ul ul {
  display: none; 
  position: absolute;
  top: 100%;
  left: 0;
  background: #E9D5FF;
  padding: 10px;
  border-radius: 8px;
  }

  nav li:hover ul {
  display: block; 
  }

  nav a {
  text-decoration: none;
  color: #7C3AED;
  font-weight: bold;
  }

  nav a:hover {
    text-decoration: underline;
  }


  .form-box {
    width: 300px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 12px;
    background: linear-gradient(135deg, #E9D5FF, #C084FC);
    border: 2px solid #4B0082;

    box-shadow: 0 8px 20px rgba(75, 0, 130, 0.4);
  }

  .form-box label {
    font-weight: bold;
  }

  .form-box input {
    width: 100%;
    padding: 5px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 8px;
    background-color: #7C3AED;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background-color: #4B0082;
  }
  </style>

  <div class = "form-box";>
  <form>
    <label>Quiz Title:</label><br>
    <input type="text"><br><br>

    <label>Upload File:</label><br>
    <input type="file"><br><br>

    <label>Upload Proof Image:</label><br>
    <input type="file" accept="image/*"><br><br>

    <button type="button" onclick="alert('Submitted (simulated)')">Submit</button>
  </form>
  </div>

  <div class="quiz-images">
  <img src="quiz1.jpg">
  <img src="quiz2.jpg">
  <img src="quiz3.jpg">
  </div>
  
</body>
</html>
