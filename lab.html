  <style>
  body {
  background-image: url('dss.jpg');

  h1 {
    text-align: center;

  nav ul {
  margin: 0;
  padding-left: 20px;

  nav a {
    text-decoration: none;

    text-decoration: underline;

  .form-box {
    width: 300px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 12px;
    background: linear-gradient(135deg, #E9D5FF, #C084FC);
    border: 2px solid #4B0082;

    box-shadow: 0 8px 20px rgba(75, 0, 130, 0.4);
  }

  .form-box label {
    font-weight: bold;
  }

  .form-box input {
    width: 100%;
    padding: 5px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 8px;
    background-color: #7C3AED;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {

  }

  <div class = "form-box";>

    <label>Lab Work Title:</label><br>

  </form>
